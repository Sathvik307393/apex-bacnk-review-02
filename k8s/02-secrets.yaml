# ============================================================
# NexaBank — Kubernetes Secret Template
# ============================================================
# IMPORTANT: Do NOT commit real values to Git.
# 
# How to apply:
#   1. Base64-encode each value:
#        echo -n 'your-value' | base64
#   2. Replace the placeholder below with the encoded value
#   3. Apply with:
#        kubectl apply -f k8s/02-secrets.yaml
#
# Or use the helper script:
#   ./azure/create-k8s-secret.sh
# ============================================================
apiVersion: v1
kind: Secret
metadata:
  name: nexa-secrets
  namespace: nexabank
type: Opaque
data:
  # echo -n 'YOUR_DB_PASSWORD' | base64
  DB_PASSWORD: REPLACE_WITH_BASE64_ENCODED_DB_PASSWORD

  # echo -n 'YOUR_JWT_SECRET' | base64
  JWT_SECRET: REPLACE_WITH_BASE64_ENCODED_JWT_SECRET

  # echo -n 'YOUR_STORAGE_CONNECTION_STRING' | base64
  AZURE_STORAGE_CONNECTION_STRING: REPLACE_WITH_BASE64_ENCODED_STORAGE_CONN_STR
