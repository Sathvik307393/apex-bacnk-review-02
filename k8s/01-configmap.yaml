apiVersion: v1
kind: ConfigMap
metadata:
  name: nexa-config
  namespace: nexabank
data:
  # ── Environment ──
  NODE_ENV: "production"

  # ── Database (non-sensitive) ──
  DB_HOST: "apexbank-db.postgres.database.azure.com"
  DB_PORT: "5432"
  DB_USER: "nexaadmin"
  DB_NAME: "apex_bank"
  DB_SSL: "true"

  # ── Internal Service URLs ──
  # These resolve to ClusterIP services within the nexabank namespace
  AUTH_SERVICE_URL: "http://nexa-auth:3001"
  USER_SERVICE_URL: "http://nexa-user:3002"
  TRANSACTION_SERVICE_URL: "http://nexa-transactions:3003"
  KYC_SERVICE_URL: "http://nexa-kyc:3004"
  DOC_PROCESSOR_URL: "http://nexa-document-processor:3005"
  AUDIT_SERVICE_URL: "http://nexa-audit:3006"
  ADMIN_SERVICE_URL: "http://nexa-admin:3007"

  # ── CORS ──
  CORS_ORIGIN: "*"

  # ── Logging ──
  LOG_LEVEL: "info"
