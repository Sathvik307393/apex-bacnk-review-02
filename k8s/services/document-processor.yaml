# ============================================================
# Document Processor Service — Deployment + ClusterIP (INTERNAL)
# Runs OCR (Tesseract) and PDF parsing — needs more CPU
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexa-document-processor
  namespace: nexabank
  labels:
    app: nexa-document-processor
    component: document-processor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nexa-document-processor
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: nexa-document-processor
        component: document-processor
    spec:
      containers:
        - name: document-processor
          image: nexabankacr.azurecr.io/nexa-document-processor:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3005
          envFrom:
            - configMapRef:
                name: nexa-config
          env:
            - name: PORT
              value: "3005"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nexa-secrets
                  key: DB_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: nexa-secrets
                  key: JWT_SECRET
            - name: AZURE_STORAGE_CONNECTION_STRING
              valueFrom:
                secretKeyRef:
                  name: nexa-secrets
                  key: AZURE_STORAGE_CONNECTION_STRING
          resources:
            # OCR is CPU-heavy — give it more headroom
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 3005
            initialDelaySeconds: 20
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 3005
            initialDelaySeconds: 15
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: nexa-document-processor
  namespace: nexabank
  labels:
    app: nexa-document-processor
spec:
  type: ClusterIP
  selector:
    app: nexa-document-processor
  ports:
    - name: http
      port: 3005
      targetPort: 3005
      protocol: TCP
