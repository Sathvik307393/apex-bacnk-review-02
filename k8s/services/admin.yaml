# ============================================================
# Admin Service — Deployment + ClusterIP Service (INTERNAL)
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexa-admin
  namespace: nexabank
  labels:
    app: nexa-admin
    component: admin
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nexa-admin
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: nexa-admin
        component: admin
    spec:
      containers:
        - name: admin
          image: apexbankregistry.azurecr.io/nexa-admin:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3007
          envFrom:
            - configMapRef:
                name: nexa-config
          env:
            - name: PORT
              value: "3007"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nexa-secrets
                  key: DB_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: nexa-secrets
                  key: JWT_SECRET
            - name: AZURE_STORAGE_CONNECTION_STRING
              valueFrom:
                secretKeyRef:
                  name: nexa-secrets
                  key: AZURE_STORAGE_CONNECTION_STRING
          resources:
            requests:
              cpu: "150m"
              memory: "192Mi"
            limits:
              cpu: "400m"
              memory: "384Mi"
          volumeMounts:
            - name: secrets-store-inline
              mountPath: "/mnt/secrets-store"
              readOnly: true
          livenessProbe:
            httpGet:
              path: /health
              port: 3007
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 3007
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: secrets-store-inline
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: "azure-kvname-user-msi"
---
apiVersion: v1
kind: Service
metadata:
  name: nexa-admin
  namespace: nexabank
  labels:
    app: nexa-admin
spec:
  type: ClusterIP
  selector:
    app: nexa-admin
  ports:
    - name: http
      port: 3007
      targetPort: 3007
      protocol: TCP



