name: Build & Deploy NexaBank to AKS

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ${{ secrets.ACR_LOGIN_SERVER }}
  RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
  AKS_CLUSTER: ${{ secrets.AKS_CLUSTER_NAME }}

jobs:
  # ─── Build & Push all images to ACR (parallel matrix) ───────────────────────
  build:
    name: Build & Push — ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: api-gateway
            dockerfile: ./services/api-gateway/Dockerfile
          - service: auth
            dockerfile: ./services/auth/Dockerfile
          - service: user
            dockerfile: ./services/user/Dockerfile
          - service: transactions
            dockerfile: ./services/transactions/Dockerfile
          - service: kyc
            dockerfile: ./services/kyc/Dockerfile
          - service: audit
            dockerfile: ./services/audit/Dockerfile
          - service: admin
            dockerfile: ./services/admin/Dockerfile

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to Azure Container Registry
        run: az acr login --name crnexabankdev

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          # Use the Buildx instance bundled with the runner's Docker daemon.
          # This avoids pulling a separate BuildKit container from Docker Hub.
          driver: docker

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/nexa-${{ matrix.service }}:latest
            ${{ env.REGISTRY }}/nexa-${{ matrix.service }}:${{ github.sha }}

  # ─── Deploy to AKS ───────────────────────────────────────────────────────────
  deploy:
    name: Deploy to AKS
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get AKS credentials
        uses: azure/aks-set-context@v3
        with:
          resource-group: ${{ env.RESOURCE_GROUP }}
          cluster-name: ${{ env.AKS_CLUSTER }}

      - name: Seed Key Vault with GitHub Secrets
        run: |
          az keyvault secret set --vault-name kv-nexabank-dev --name JWT-SECRET --value "${{ secrets.JWT_SECRET }}"
          az keyvault secret set --vault-name kv-nexabank-dev --name AZURE-STORAGE-CONNECTION-STRING --value "${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}"

      # Apply namespace, configmap and secrets (idempotent)
      - name: Apply base manifests
        run: |
          kubectl apply -f k8s/00-namespace.yaml

          # Create/update ConfigMap
          kubectl apply -f k8s/01-configmap.yaml

          # Apply Key Vault CSI Secret Provider Class
          kubectl apply -f k8s/02-secretproviderclass.yaml

          # Apply Ingress
          kubectl apply -f k8s/03-ingress.yaml

      # Apply all service manifests
      - name: Apply service manifests
        run: |
          kubectl apply -f k8s/services/
          kubectl delete deployment nexa-document-processor --namespace nexabank --ignore-not-found
          kubectl delete service nexa-document-processor --namespace nexabank --ignore-not-found

      # Update each deployment to the exact image tag for this commit
      - name: Update image tags
        run: |
          SERVICES=(api-gateway auth user transactions kyc audit admin)
          for svc in "${SERVICES[@]}"; do
            CONTAINER_NAME=$(echo $svc | sed 's/-/_/g')
            kubectl set image deployment/nexa-${svc} \
              ${svc}=${{ env.REGISTRY }}/nexa-${svc}:${{ github.sha }} \
              --namespace nexabank
          done

      # Wait for all rollouts to complete
      - name: Wait for rollouts
        run: |
          DEPLOYMENTS=(nexa-audit nexa-auth nexa-user nexa-transactions nexa-kyc nexa-admin nexa-api-gateway)
          for dep in "${DEPLOYMENTS[@]}"; do
            echo "Waiting for $dep..."
            kubectl rollout status deployment/$dep --namespace nexabank --timeout=120s
          done

      - name: Verify Application Gateway ingress
        run: |
          echo "Waiting for AGIC to publish the ingress address..."
          for i in {1..18}; do
            ENDPOINTS=$(kubectl get endpoints nexa-api-gateway -n nexabank -o jsonpath='{.subsets[*].addresses[*].ip}')
            ADDRESS=$(kubectl get ingress nexa-ingress -n nexabank -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
            if [ -n "$ENDPOINTS" ] && [ -n "$ADDRESS" ]; then
              echo "Application Gateway is routing to: $ENDPOINTS"
              echo "Application URL: http://$ADDRESS"
              curl --fail --retry 6 --retry-delay 10 --max-time 15 "http://$ADDRESS/health"
              break
            fi
            echo "Attempt $i/18: endpoints='$ENDPOINTS', ingress='$ADDRESS'"
            sleep 10
          done

          if [ -z "$ENDPOINTS" ] || [ -z "$ADDRESS" ]; then
            kubectl get pods,svc,endpoints,ingress -n nexabank -o wide
            kubectl describe ingress nexa-ingress -n nexabank
            kubectl get events -n nexabank --sort-by='.lastTimestamp'
            kubectl logs -n kube-system -l app=ingress-appgw --tail=200 || true
            echo "AGIC did not create a healthy Application Gateway route."
            exit 1
          fi
