name: Build & Deploy NexaBank to AKS

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ${{ secrets.ACR_LOGIN_SERVER }}
  RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
  AKS_CLUSTER: ${{ secrets.AKS_CLUSTER_NAME }}

jobs:
  # ─── Build & Push all images to ACR (parallel matrix) ───────────────────────
  build:
    name: Build & Push — ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: api-gateway
            dockerfile: ./services/api-gateway/Dockerfile
          - service: auth
            dockerfile: ./services/auth/Dockerfile
          - service: user
            dockerfile: ./services/user/Dockerfile
          - service: transactions
            dockerfile: ./services/transactions/Dockerfile
          - service: kyc
            dockerfile: ./services/kyc/Dockerfile
          - service: document-processor
            dockerfile: ./services/document-processor/Dockerfile
          - service: audit
            dockerfile: ./services/audit/Dockerfile
          - service: admin
            dockerfile: ./services/admin/Dockerfile

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/nexa-${{ matrix.service }}:latest
            ${{ env.REGISTRY }}/nexa-${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Deploy to AKS ───────────────────────────────────────────────────────────
  deploy:
    name: Deploy to AKS
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get AKS credentials
        uses: azure/aks-set-context@v3
        with:
          resource-group: ${{ env.RESOURCE_GROUP }}
          cluster-name: ${{ env.AKS_CLUSTER }}

      # Apply namespace, configmap and secrets (idempotent)
      - name: Apply base manifests
        run: |
          kubectl apply -f k8s/00-namespace.yaml

          # Create/update ConfigMap
          kubectl apply -f k8s/01-configmap.yaml

          # Create Secret from GitHub Actions secrets (base64 auto-encoded by kubectl)
          kubectl create secret generic nexa-secrets \
            --namespace nexabank \
            --from-literal=DB_PASSWORD="${{ secrets.DB_PASSWORD }}" \
            --from-literal=JWT_SECRET="${{ secrets.JWT_SECRET }}" \
            --from-literal=AZURE_STORAGE_CONNECTION_STRING="${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      # Apply all service manifests
      - name: Apply service manifests
        run: kubectl apply -f k8s/services/

      # Update each deployment to the exact image tag for this commit
      - name: Update image tags
        run: |
          SERVICES=(api-gateway auth user transactions kyc document-processor audit admin)
          for svc in "${SERVICES[@]}"; do
            CONTAINER_NAME=$(echo $svc | sed 's/-/_/g')
            kubectl set image deployment/nexa-${svc} \
              ${svc}=${{ env.REGISTRY }}/nexa-${svc}:${{ github.sha }} \
              --namespace nexabank
          done

      # Wait for all rollouts to complete
      - name: Wait for rollouts
        run: |
          DEPLOYMENTS=(nexa-audit nexa-auth nexa-user nexa-transactions nexa-kyc nexa-document-processor nexa-admin nexa-api-gateway)
          for dep in "${DEPLOYMENTS[@]}"; do
            echo "Waiting for $dep..."
            kubectl rollout status deployment/$dep --namespace nexabank --timeout=120s
          done

      # Print the public IP of the API Gateway
      - name: Get API Gateway URL
        run: |
          echo "Waiting for external IP..."
          for i in {1..12}; do
            IP=$(kubectl get svc nexa-api-gateway -n nexabank -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null)
            if [ -n "$IP" ]; then
              echo "✅ API Gateway is live at: http://$IP"
              break
            fi
            echo "Attempt $i/12 — waiting 10s..."
            sleep 10
          done
