name: 'Terraform Enterprise Deployment'

on:
  push:
    branches: [ "main" ]
  pull_request:

permissions:
  contents: read

jobs:
  terraform:
    name: 'Terraform'
    runs-on: ubuntu-latest
    
    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
      TF_VAR_jwt_secret: ${{ secrets.JWT_SECRET }}

    defaults:
      run:
        working-directory: ./infra/terraform

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Azure Login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v2
      with:
        terraform_version: 1.5.0

    - name: Terraform Format
      id: fmt
      run: terraform fmt -check

    - name: Bootstrap Terraform State Storage
      uses: azure/CLI@v1
      with:
        inlineScript: |
          # tfstate RG already exists in swedencentral — keep it there.
          # State storage location is independent of where resources are deployed.
          az group create --name rg-nexabank-tfstate --location swedencentral
          az storage account create --resource-group rg-nexabank-tfstate --name stnexabanktfstate --sku Standard_LRS --encryption-services blob
          az storage container create --name blob-tfstate --account-name stnexabanktfstate --auth-mode login || true

    - name: Release Stuck Terraform State Lock
      uses: azure/CLI@v1
      with:
        inlineScript: |
          # Break any stuck blob lease left by a previously failed/cancelled run.
          # This is safe because GitHub Actions only runs one job at a time on main.
          # The || true prevents failure if there is no active lease to break.
          az storage blob lease break \
            --account-name stnexabanktfstate \
            --container-name blob-tfstate \
            --blob-name dev.terraform.tfstate \
            --auth-mode login || true

    - name: Terraform Init
      id: init
      run: terraform init -backend-config="resource_group_name=rg-nexabank-tfstate" -backend-config="storage_account_name=stnexabanktfstate" -backend-config="container_name=blob-tfstate" -backend-config="key=dev.terraform.tfstate"

    - name: Terraform Validate
      id: validate
      run: terraform validate -no-color

    - name: Run Checkov Security Scan
      uses: bridgecrewio/checkov-action@master
      with:
        directory: ./infra/terraform
        framework: terraform
        soft_fail: true

    - name: Terraform Plan
      id: plan
      run: terraform plan -var-file="environments/dev.tfvars" -no-color

    - name: Terraform Apply
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      # Requires manual approval in GitHub Environments if configured on the repo
      run: terraform apply -var-file="environments/dev.tfvars" -auto-approve
