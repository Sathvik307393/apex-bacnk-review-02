name: 'Terraform Enterprise Deployment'

on:
  push:
    branches: [ "main" ]
  pull_request:

permissions:
  contents: read

jobs:
  terraform:
    name: 'Terraform'
    runs-on: ubuntu-latest
    
    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
      TF_VAR_jwt_secret: ${{ secrets.JWT_SECRET }}

    defaults:
      run:
        working-directory: ./infra/terraform

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Azure Login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v2
      with:
        terraform_version: 1.5.0

    - name: Terraform Format
      id: fmt
      run: terraform fmt -check

    - name: Bootstrap Terraform State Storage
      uses: azure/CLI@v1
      with:
        inlineScript: |
          az group create --name tfstate-rg --location eastus
          az storage account create --resource-group tfstate-rg --name nexatfstate307393 --sku Standard_LRS --encryption-services blob
          az storage container create --name tfstate --account-name nexatfstate307393 --auth-mode login || true

    - name: Terraform Init
      id: init
      run: terraform init -backend-config="resource_group_name=tfstate-rg" -backend-config="storage_account_name=nexatfstate307393" -backend-config="container_name=tfstate" -backend-config="key=dev.terraform.tfstate"

    - name: Terraform Validate
      id: validate
      run: terraform validate -no-color

    - name: Run Checkov Security Scan
      uses: bridgecrewio/checkov-action@master
      with:
        directory: ./infra/terraform
        framework: terraform

    - name: Terraform Plan
      id: plan
      run: terraform plan -var-file="environments/dev.tfvars" -no-color

    - name: Terraform Apply
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      # Requires manual approval in GitHub Environments if configured on the repo
      run: terraform apply -var-file="environments/dev.tfvars" -auto-approve
